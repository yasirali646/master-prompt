<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Master Prompt generate flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="24" y="24" width="912" height="56" rx="14" fill="#171717" stroke="#262626"/>
  <circle cx="52" cy="52" r="8" fill="#22c55e"/>
  <text x="72" y="58" fill="#fafafa" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Master Prompt</text>
  <text x="780" y="58" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="14">History Ę Usage Ę Settings</text>
  <rect x="120" y="120" width="720" height="360" rx="18" fill="#111827" stroke="#262626" filter="url(#shadow)"/>
  <text x="152" y="162" fill="#fafafa" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Turn ideas into master prompts</text>
  <text x="152" y="192" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="14">Structured state-machine prompts with strict rules and workflows.</text>
  <rect x="152" y="220" width="656" height="88" rx="12" fill="#0a0a0a" stroke="#404040"/>
  <text x="168" y="252" fill="#737373" font-family="system-ui,sans-serif" font-size="14">I want to create a youtube channel clone prompt</text>
