  <text x="198" y="357" fill="#052e16" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Generate</text>
  <rect x="152" y="392" width="120" height="28" rx="14" fill="#171717" stroke="#404040"/>
  <text x="168" y="411" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">YouTube clone</text>
  <rect x="282" y="392" width="150" height="28" rx="14" fill="#171717" stroke="#404040"/>
  <text x="298" y="411" fill="#a3a3a3" font-family="system-ui,sans-serif" font-size="12">Customer onboarding</text>
