<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-label="Master Prompt data architecture">
  <rect width="960" height="320" fill="#0a0a0a"/>
  <text x="48" y="42" fill="#fafafa" font-family="system-ui,sans-serif" font-size="20" font-weight="700">Data &amp; privacy architecture</text>
  <rect x="48" y="72" width="260" height="200" rx="16" fill="#171717" stroke="#22c55e"/>
  <text x="72" y="108" fill="#22c55e" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Browser</text>
  <text x="72" y="138" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" API keys (encrypted)</text>
  <text x="72" y="162" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" Guest history &amp; settings</text>
  <text x="72" y="186" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" Draft &amp; theme prefs</text>
  <rect x="350" y="72" width="260" height="200" rx="16" fill="#171717" stroke="#404040"/>
  <text x="374" y="108" fill="#fafafa" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Next.js API</text>
  <text x="374" y="138" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" Stream generate / refine</text>
  <text x="374" y="162" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" Keys in memory only</text>
  <text x="374" y="186" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" OAuth via NextAuth</text>
  <rect x="652" y="72" width="260" height="200" rx="16" fill="#171717" stroke="#404040"/>
  <text x="676" y="108" fill="#fafafa" font-family="system-ui,sans-serif" font-size="16" font-weight="700">MySQL</text>
  <text x="676" y="138" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" Signed-in user data</text>
  <text x="676" y="162" fill="#d4d4d4" font-family="system-ui,sans-serif" font-size="13">" History, templates, usage</text>
  <text x="676" y="186" fill="#ef4444" font-family="system-ui,sans-serif" font-size="13">" Never stores API keys</text>
  <path d="M308 172 H342" stroke="#737373" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M610 172 H644" stroke="#737373" stroke-width="2"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#737373"/>
    </marker>
  </defs>
</svg>
