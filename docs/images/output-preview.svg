  <text x="104" y="294" fill="#d4d4d4" font-family="ui-monospace,monospace" font-size="12">STATE 2  CONTENT PLAN: outline series and upload cadence.</text>
  <text x="104" y="316" fill="#d4d4d4" font-family="ui-monospace,monospace" font-size="12">STATE 3  SCRIPT: draft hooks, retention beats, and CTA.</text>
