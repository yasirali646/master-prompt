  <text x="104" y="188" fill="#22c55e" font-family="ui-monospace,monospace" font-size="13" font-weight="700">## ROLE</text>
  <text x="104" y="214" fill="#d4d4d4" font-family="ui-monospace,monospace" font-size="12">You are a YouTube channel strategist operating as a state machine.</text>
  <text x="104" y="246" fill="#22c55e" font-family="ui-monospace,monospace" font-size="13" font-weight="700">## STATES</text>
